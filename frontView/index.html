<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/images/main.242b8b1ce339b38fd589.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/bs/bootstrap.css">
  <link rel="stylesheet" href="./assets/css/style.css">
  <title>TaskMaster</title>
</head>

<body>

  <main>
    <div class="background-image">

      <nav class="navbar navbar-expand-lg navbar-light" id="nav-bar">
        <div class="container">
          <div class="">
            <a class="navbar-brand text-light fw-bold" href="index.html">
              <!-- <img src="../frontView/assets/images/main.242b8b1ce339b38fd589.png" alt="" width="40">  -->TASKMASTER
            </a>
          </div>

          <div class="collapse navbar-collapse ms-auto" id="navbarSupportedContent">
            <div id="authButtons">
              <a href="../frontView/login.html"
                class="ms-auto btn btn-md rounded-2 py-1 ps-3 pe-3 text-light signup fw-bold">
                Login
              </a>
            </div>
          </div>

        </div>
      </nav>


      <div class="taskmaster text-center">
        <h1 class=""> <b id="welcomeUser"></b> </h1>
        <h4 class="">Manage your tasks.</h4>
        <p>Ready to add, edit, delete and keep track of your tasks.</p>
        <form class="d-flex ">
          <div class="form-floating mb-3 d-flex ">
            <input type="text" class="form-control" id="floatingInput" placeholder="search here..." required>
            <label for="floatingInput">Search</label>

            <button class="btn btn-md ms-2" type="submit">Search Task</button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <section class="container my-3">
    <button type="button" class="btn btn-lg text-light fw-bold" data-bs-toggle="modal"
      data-bs-target="#exampleModal">Add
      Task</button>


    <div class="add-task">
      <div class="row mt-4">
        <div class="col-xl-4 col-md-4 col-sm-12">
          <div class="card">
            <div class="card-header">
              <h3 class="fw-bold text-light">John Doe</h3>
            </div>
            <div class="card-body">
              <p>Title:</p>
              <p>Description:</p>
              <p>Assigned users:</p>
              <p>Status:</p>
              <p>Due date:</p>
              <div class="edit-and-delete">
                <a href="#">
                  <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor"
                    class="bi bi-trash-fill text-danger" viewBox="0 0 16 16">
                    <path
                      d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1H2.5zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5zM8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5zm3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0z" />
                  </svg>
                </a>
                <a href="#" class="ms-3">
                  <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor"
                    class="bi bi-pencil-square" viewBox="0 0 16 16">
                    <path
                      d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z" />
                    <path fill-rule="evenodd"
                      d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z" />
                  </svg>
                </a>
              </div>


            </div>
          </div>
        </div>
      </div>
    </div>
  </section>





  <!-- Modal -->
  <div class="modal-div">

    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Add Your Task</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="responseMessage" class="mt-3"></div>

            <form id="createTaskForm">
              <div class="row">
                <div class="mb-3">
                  <label for="recipient-name" class="col-form-label">Title:</label>
                  <input type="text" class="form-control" id="taskTitle" placeholder="Add a title">
                </div>
                <div class="col-xl-6 col-md-6 col-sm-12">
                  <div class="mb-3">
                    <label for="files" class="col-form-label">Files:</label>
                    <input type="file" class="form-control" id="taskFiles" multiple>
                  </div>
                </div>
                <div class="col-xl-6 col-md-6 col-sm-12">
                  <div class="mb-3">
                    <label for="assigned-users" class="col-form-label">Assigned Users:</label>
                    <input type="text" class="form-control" id="assignedUsers"
                      placeholder="e.g 'jane@gmail.com, stephen@gmail.com'">
                  </div>
                </div>

                <div class="col-xl-6 col-md-6 col-sm-12">
                  <div class="mb-3">
                    <label for="status" class="col-form-label">Status:</label>
                    <select name="" id="taskStatus" class="form-select">
                      <option value="todo">Todo</option>
                      <option value="in progress">In Progress</option>
                      <option value="done">Pending</option>
                    </select>
                  </div>
                </div>
                <div class="col-xl-6 col-md-6 col-sm-12">
                  <div class="mb-3">
                    <label for="duedate" class="col-form-label">Due Date:</label>
                    <input type="datetime-local" class="form-control" id="dueDate">
                  </div>
                </div>

                <div class="mb-3">
                  <label for="description" class="col-form-label">Descrption:</label>
                  <textarea class="form-control" id="taskDescription" placeholder="add task description"></textarea>
                </div>

              </div>

              <div class="modal-footer">
                <button type="submit" class="btn">Add Task</button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>


  <script src="./assets/bs/bootstrap.bundle.js"></script>
  <script src="./assets/js/script.js"></script>
</body>

</html>
